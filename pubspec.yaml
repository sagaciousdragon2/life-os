name: daily_life_os
description: A personal Daily Life OS — cross-platform reflection & journal tool with local AI insights.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.0
  path_provider: ^2.1.5

  # Networking
  http: ^1.2.2

  # Image picking
  image_picker: ^1.1.2

  # Charts
  fl_chart: ^0.70.2

  # Date formatting
  intl: ^0.19.0

  # Local storage for settings
  shared_preferences: ^2.3.4

  # UUID generation
  uuid: ^4.5.1

  # Base64 / convert
  # (dart:convert is built-in)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
